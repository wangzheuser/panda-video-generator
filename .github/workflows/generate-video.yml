name: Generate Video

on:
  workflow_dispatch:  # Manual trigger only (POC phase)

jobs:
  generate-video:
    runs-on: ubuntu-latest
    timeout-minutes: 90  # Set timeout for video generation (may take 30-60 minutes)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Node.js dependencies
        run: pnpm install

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            chromium-browser \
            chromium-chromedriver \
            xvfb \
            ffmpeg \
            libgbm-dev \
            libnss3 \
            libatk-bridge2.0-0 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libasound2t64

      - name: Create .env.local file
        run: |
          echo "DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}" > .env.local
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Create necessary directories
        run: |
          mkdir -p output/tts output/video public/tts public/video

      - name: Set up display server for headless browser
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Generate video
        run: |
          chmod +x scripts/generate-video.sh
          ./scripts/generate-video.sh https://www.zhihu.com/question/1997750868066447778
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
          PUPPETEER_EXECUTABLE_PATH: '/usr/bin/chromium-browser'

      - name: Find generated video file
        id: find-video
        run: |
          VIDEO_FILE="output/video/video.mp4"
          if [ ! -f "$VIDEO_FILE" ]; then
            echo "No video file found at $VIDEO_FILE"
            ls -la output/video/ || echo "output/video directory does not exist"
            exit 1
          fi
          echo "video_path=$VIDEO_FILE" >> $GITHUB_OUTPUT
          echo "Found video: $VIDEO_FILE"

      - name: Upload video as artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-video
          path: ${{ steps.find-video.outputs.video_path }}
          retention-days: 30

      - name: Upload additional files as artifacts (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-files
          path: |
            output/tts/input.txt
            output/tts/audio.mp3
            output/tts/audio.vtt
          retention-days: 7
          if-no-files-found: ignore
